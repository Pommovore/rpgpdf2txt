{% extends "base.html" %}

{% block content %}
<div class="row mt-4">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Historique des extractions <span
                    id="pollingIndicator" class="text-info small" style="display: none;"><span
                        class="spinner-border spinner-border-sm me-1"></span>Rafraîchissement auto...</span></h5>
            <div>
                <button class="btn btn-sm btn-outline-info" onclick="loadRequests()">Rafraîchir</button>
            </div>
        </div>

        <div class="card shadow bg-dark text-light border-secondary">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0 align-middle">
                        <thead>
                            <tr>
                                <th>ID / File d'attente</th>
                                <th>ID Texte</th>
                                <th>Statut</th>
                                <th>Date</th>
                                <th>Résultat</th>
                            </tr>
                        </thead>
                        <tbody id="requestsTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-3">Chargement de l'historique...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ app_prefix }}/static/js/history.js?v={{ range(1, 99999) | random }}"></script>
{% endblock %}
