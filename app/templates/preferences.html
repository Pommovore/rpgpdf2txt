{% extends "base.html" %}

{% block content %}
<div class="row mt-4 justify-content-center">
    <div class="col-md-6">
        <!-- Encart Token d'API -->
        <div class="card shadow bg-dark text-light border-secondary mb-4">
            <div class="card-header border-secondary">
                <h5 class="mb-0"><i class="bi bi-key me-2"></i>Mon Token d'API</h5>
            </div>
            <div class="card-body">
                <p class="small text-muted mb-2">Utilisez ce token pour interagir avec l'API (Header <code>token</code>)
                    :</p>
                <div class="input-group input-group-sm">
                    <input type="text" class="form-control bg-dark text-light border-secondary" id="apiTokenInput"
                        readonly value="Chargement...">
                    <button class="btn btn-outline-secondary" type="button" id="copyTokenBtn" onclick="copyApiToken()">
                        <i class="bi bi-clipboard"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Encart Changement de mot de passe -->
        <div class="card shadow bg-dark text-light border-secondary">
            <div class="card-header border-secondary">
                <h5 class="mb-0"><i class="bi bi-lock me-2"></i>Changer le mot de passe</h5>
            </div>
            <div class="card-body">
                <form id="changePasswordForm">
                    <div class="mb-3">
                        <label for="current_password" class="form-label">Mot de passe actuel</label>
                        <input type="password" class="form-control bg-dark text-light border-secondary"
                            id="current_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Nouveau mot de passe</label>
                        <input type="password" class="form-control bg-dark text-light border-secondary"
                            id="new_password" required minlength="8">
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirmer le nouveau mot de passe</label>
                        <input type="password" class="form-control bg-dark text-light border-secondary"
                            id="confirm_password" required minlength="8">
                    </div>

                    <div id="passwordMsg" class="alert d-none"></div>

                    <button type="submit" class="btn btn-warning w-100">Mettre à jour le mot de passe</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="{{ app_prefix }}/static/js/preferences.js?v={{ range(1, 99999) | random }}"></script>
{% endblock %}
