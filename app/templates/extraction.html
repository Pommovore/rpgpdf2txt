{% extends "base.html" %}

{% block content %}
<div class="row mt-4 justify-content-center">
    <div class="col-md-6">
        <div class="card shadow bg-dark text-light border-secondary">
            <div class="card-header border-secondary">
                <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Nouvelle Extraction</h5>
            </div>
            <div class="card-body">
                <form id="extractForm">
                    <div class="mb-3">
                        <label for="id_texte" class="form-label">ID Texte (min 3 chars)</label>
                        <input type="text" class="form-control bg-dark text-light border-secondary" id="id_texte"
                            name="id_texte" minlength="3" required>
                    </div>

                    <div class="mb-3">
                        <label for="webhook_url" class="form-label">URL Webhook</label>
                        <input type="url" class="form-control bg-dark text-light border-secondary" id="webhook_url"
                            name="webhook_url" placeholder="https://" required>
                        <div class="form-text text-muted">Une requête POST y sera envoyée à la fin.</div>
                    </div>

                    <div class="mb-3">
                        <label for="pdf_url" class="form-label">URL du PDF (Optionnel)</label>
                        <input type="url" class="form-control bg-dark text-light border-secondary" id="pdf_url"
                            name="pdf_url" placeholder="https://drive.google.com/...">
                    </div>

                    <div class="mb-4">
                        <label for="pdf_file" class="form-label">OU Fichier PDF</label>
                        <input class="form-control bg-dark text-light border-secondary" type="file" id="pdf_file"
                            name="pdf_file" accept=".pdf">
                    </div>

                    <div class="mb-4 form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="ia_validate"
                            name="ia_validate" value="true">
                        <label class="form-check-label text-light" for="ia_validate"
                            title="Si coché, l'IA tentera de nettoyer et corriger le texte extrait.">
                            Correction IA
                        </label>
                    </div>

                    <div id="extractMsg" class="alert d-none"></div>

                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">Démarrer l'extraction</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="{{ app_prefix }}/static/js/extraction.js?v={{ range(1, 99999) | random }}"></script>
{% endblock %}
